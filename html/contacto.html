<!DOCTYPE html>
<html lang="es">
<head>
	<!-- Configuración básica del documento -->
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Contacto | Tu Yo Cafe</title>

	<!-- Enlace a la hoja de estilos general del proyecto -->
	<link rel="stylesheet" href="../css/estilos.css" />

	<!-- Precarga de Google Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<!-- Carga de la tipografía principal -->
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- ================= HEADER ================= -->
<!-- Header -->
<header class="header">
	<div class="contenedor_header">

		<!-- Marca: logo + nombre + slogan -->
		<div class="marca">
			<div class="logo_marca">

				<!-- Imagen del logo del café -->
				<img src="img/logo.jpg" width="100" height="100">
			</div>

			<!-- Nombre y slogan -->
			<div class="texto_marca">
				<h1 class="nombre_marca">Tu Yo Cafe</h1>
				<p class="slogan_marca">Café, calma y buena vibra en Querétaro</p>
			</div>
		</div>

		<!-- Fecha y hora dinámica que se actualiza con JavaScript -->
		<div class="datetime">
			<span class="etiqueta_datetime">Fecha y hora:</span>
			<span id="fechaHora" class="valor_datetime">(Añadir)</span>
		</div>

		<!-- Otras páginas de la empresa -->
		<div class="elementos">
			<ul class="menu">
				<li class="item_menu">
					<a class="link_menu" href="../index.html">INICIO</a>
				</li>
				<li class="item_menu">
					<a class="link_menu" href="nosotros.html">NOSOTROS</a>
				</li>
				<li class="item_menu">
					<a class="link_menu" href="contacto.html">CONTACTO</a>
				</li>
			</ul>
		</div>

	</div>
</header>

<!-- ================= CONTENIDO PRINCIPAL ================= -->
<main class="main">
	<div class="contenedor_main">

		<section class="seccion">

			<!-- Título y descripción de la sección -->
			<header class="header_seccion">
				<h2 class="titulo_seccion">Encuesta rápida</h2>
				<p class="subtitulo_seccion">
					Queremos conocer tu opinión, por favor llénala.
				</p>
			</header>

			<div class="bloque">

				<!-- Imagen decorativa relacionada al contacto -->
				<div class="contacto_imagen_superior">
					<img src="img/contacto.jpg" alt="Contacto Tu Yo Cafe">
				</div>

				<!-- Formulario de encuesta -->
				<form id="formEncuesta" class="formulario">
					<input type="text" placeholder="Tu nombre" required>
					<input type="email" placeholder="Tu correo" required>
					<textarea rows="4" placeholder="¿Qué te pareció nuestro café?" required></textarea>
					<button type="submit" class="boton_ubicacion">Enviar</button>
				</form>

				<!-- Mensaje que aparece cuando se envía correctamente -->
				<div id="mensajeExito" class="mensaje_exito" style="display: none;">
					Encuesta contestada ✔
				</div>

			</div>
		</section>

	</div>
</main>

<!-- ================= SCRIPT DEL FORMULARIO ================= -->
<script>
	// Se obtiene el formulario y el mensaje de éxito
	const form = document.getElementById("formEncuesta");
	const mensaje = document.getElementById("mensajeExito");

	// Evento que se ejecuta cuando se envía el formulario
	form.addEventListener("submit", function(e) {

		// Evita que la página se recargue
		e.preventDefault();

		// Oculta el formulario y muestra el mensaje
		form.style.display = "none";
		mensaje.style.display = "block";

		// Después de 3 segundos se restaura todo
		setTimeout(function() {
			mensaje.style.display = "none";
			form.reset(); // Limpia los campos
			form.style.display = "flex";
		}, 3000);
	});
</script>

<!-- La librería jQuery -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>

<!-- Carga de la funcionalidad del bxSlider para el carrusel -->
<script src="https://cdn.jsdelivr.net/npm/bxslider@4.2.17/dist/jquery.bxslider.min.js"></script>

<!-- Archivo JavaScript del proyecto -->
<script src="../js/main.js"></script>

</body>
</html>
