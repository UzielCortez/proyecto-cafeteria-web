<!DOCTYPE html>
<html lang="es">
<head>
	<!-- Configuración básica del documento -->
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Contacto | Tu Yo Cafe</title>

	<!-- Enlace a la hoja de estilos general del proyecto -->
	<link rel="stylesheet" href="../css/estilos.css" />
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
	<div class="contenedor_header">

		<!-- Nombre de la marca -->
		<h1 class="nombre_marca">Tu Yo Cafe</h1>

		<!-- Menú de navegación principal -->
		<ul class="menu">
			<li class="item_menu">
				<a class="link_menu" href="../index.html">INICIO</a>
			</li>
			<li class="item_menu">
				<a class="link_menu" href="nosotros.html">NOSOTROS</a>
			</li>
			<li class="item_menu">
				<a class="link_menu" href="contacto.html">CONTACTO</a>
			</li>
		</ul>
	</div>
</header>

<!-- ================= CONTENIDO PRINCIPAL ================= -->
<main class="main">
	<div class="contenedor_main">

		<section class="seccion">

			<!-- Título y descripción de la sección -->
			<header class="header_seccion">
				<h2 class="titulo_seccion">Encuesta rápida</h2>
				<p class="subtitulo_seccion">
					Queremos conocer tu opinión, por favor llénala.
				</p>
			</header>

			<div class="bloque">

				<!-- Imagen decorativa relacionada al contacto -->
				<div class="contacto_imagen_superior">
					<img src="img/contacto.jpg" alt="Contacto Tu Yo Cafe">
				</div>

				<!-- Formulario de encuesta -->
				<form id="formEncuesta" class="formulario">
					<input type="text" placeholder="Tu nombre" required>
					<input type="email" placeholder="Tu correo" required>
					<textarea rows="4" placeholder="¿Qué te pareció nuestro café?" required></textarea>
					<button type="submit" class="boton_ubicacion">Enviar</button>
				</form>

				<!-- Mensaje que aparece cuando se envía correctamente -->
				<div id="mensajeExito" class="mensaje_exito" style="display: none;">
					Encuesta contestada ✔
				</div>

			</div>
		</section>

	</div>
</main>

<!-- ================= SCRIPT DEL FORMULARIO ================= -->
<script>
	// Se obtiene el formulario y el mensaje de éxito
	const form = document.getElementById("formEncuesta");
	const mensaje = document.getElementById("mensajeExito");

	// Evento que se ejecuta cuando se envía el formulario
	form.addEventListener("submit", function(e) {

		// Evita que la página se recargue
		e.preventDefault();

		// Oculta el formulario y muestra el mensaje
		form.style.display = "none";
		mensaje.style.display = "block";

		// Después de 3 segundos se restaura todo
		setTimeout(function() {
			mensaje.style.display = "none";
			form.reset(); // Limpia los campos
			form.style.display = "flex";
		}, 3000);
	});
</script>

</body>
</html>
